name: OTC-X Daily Pipeline

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

# CRITICAL: Antigravity missed this. Without it, you can't push data back.
permissions:
  contents: write 

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Good addition: speeds up daily dependency installation

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run main orchestrator
        run: python main.py

      # CRITICAL: Antigravity missed this. Without it, your new data is destroyed when the VM shuts down.
      - name: Commit and push new data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ logs/
          git commit -m "Automated daily OTC-X data update" || echo "No changes to commit"
          git push