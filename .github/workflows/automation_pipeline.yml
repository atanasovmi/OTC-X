name: OTC-X Daily Pipeline

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

# Required for the commit-and-push step to write back pipeline artifacts
permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        # The daily pipeline runs the test suite as a gate before the
        # data refresh, so it needs the dev dependencies (pytest-bdd
        # plus its transitive pytest). requirements-dev.txt itself
        # pulls in requirements.txt via `-r`, so this single install
        # covers both runtime and test dependencies.
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run test suite
        run: pytest tests/ -x -q

      - name: Run main orchestrator
        run: python -m backend.pipeline

      # Persist pipeline artifacts back to the repository
      - name: Commit and push new data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add backend/data/ backend/logs/
          git commit -m "Automated daily OTC-X data update" || echo "No changes to commit"
          git push