name: OTC-X Daily Pipeline

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

# Required for the commit-and-push step to write back pipeline artifacts
permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run main orchestrator
        run: python -m backend.pipeline

      # Persist pipeline artifacts back to the repository
      - name: Commit and push new data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add backend/data/ backend/logs/
          git commit -m "Automated daily OTC-X data update" || echo "No changes to commit"
          git push